<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Left node -->
  <circle cx="4" cy="12" r="2" fill="currentColor"/>
  <!-- Connector line: left node → bar -->
  <line x1="6" y1="12" x2="10" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Double bar line (║) -->
  <line x1="10.5" y1="6" x2="10.5" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="6" x2="13" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Connector line: bar → right node -->
  <line x1="14" y1="12" x2="18" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polyline points="16,9.5 18.5,12 16,14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right node -->
  <circle cx="20" cy="12" r="2" fill="currentColor" opacity="0.7"/>
</svg>
